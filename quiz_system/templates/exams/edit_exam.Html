{% extends 'base.html' %}
{% block title %}Edit Exam{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h3 class="fw-bold mb-4">
                    <i class="fas fa-edit text-primary me-2"></i>Edit Exam
                </h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Exam Title</label>
                        <input type="text" name="title" class="form-control"
                               value="{{ exam.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control"
                                  rows="3">{{ exam.description }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Duration (minutes)</label>
                        <input type="number" name="duration_minutes"
                               class="form-control"
                               value="{{ exam.duration_minutes }}"
                               min="5" max="180" required>
                    </div>

                    <!-- Timing Option -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Exam Timing</label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="radio" class="btn-check"
                                       name="timing_type" value="scheduled"
                                       id="scheduled"
                                       {% if not exam.is_always_active %}checked{% endif %}>
                                <label class="btn btn-outline-primary w-100 p-3 text-start"
                                       for="scheduled">
                                    <div class="fw-bold">
                                        <i class="fas fa-calendar me-1"></i>Scheduled
                                    </div>
                                    <small class="text-muted">Start aur end time set karo</small>
                                </label>
                            </div>
                            <div class="col-md-6">
                                <input type="radio" class="btn-check"
                                       name="timing_type" value="anytime"
                                       id="anytime"
                                       {% if exam.is_always_active %}checked{% endif %}>
                                <label class="btn btn-outline-success w-100 p-3 text-start"
                                       for="anytime">
                                    <div class="fw-bold">
                                        <i class="fas fa-bolt me-1"></i>Start Anytime
                                    </div>
                                    <small class="text-muted">Student kabhi bhi start kare</small>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Scheduled Times -->
                    <div id="scheduled_times"
                         {% if exam.is_always_active %}style="display:none"{% endif %}>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Start Time</label>
                                <input type="datetime-local" name="start_time"
                                       class="form-control"
                                       value="{{ exam.start_time|date:'Y-m-d' }}T{{ exam.start_time|date:'H:i' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">End Time</label>
                                <input type="datetime-local" name="end_time"
                                       class="form-control"
                                       value="{{ exam.end_time|date:'Y-m-d' }}T{{ exam.end_time|date:'H:i' }}">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit"
                                class="btn btn-primary flex-grow-1 py-2 fw-semibold">
                            <i class="fas fa-save me-2"></i>Save Changes
                        </button>
                        <a href="{% url 'my_exams' %}"
                           class="btn btn-outline-secondary py-2">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.querySelectorAll('input[name="timing_type"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const scheduledDiv = document.getElementById('scheduled_times');
            scheduledDiv.style.display = this.value === 'anytime' ? 'none' : 'block';
        });
    });
</script>
{% endblock %}
